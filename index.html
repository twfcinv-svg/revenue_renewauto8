<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>月營收熱力圖</title>
  <script>
    const VER = new URLSearchParams(location.search).get('v') || Date.now();
    document.write('<link rel="stylesheet" href="styles.css?v='+VER+'">');
    document.write('<link rel="stylesheet" href="fix-align.css?v='+VER+'">');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

  <style>
    body { margin: 0; }

    /* ✅ 新增：安全置中 header（不動原本 class） */
    .header-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 16px 10px;
    }
    .header-title-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
    }

    /* 副標（變精緻） */
    .sub-title {
      color: #38bdf8;
      font-size: 20px;       /* 👈 變小 */
      font-weight: 800;      /* 👈 不要太粗 */
      letter-spacing: 1px;   /* 👈 增加質感 */
      margin-bottom: -4px;   /* 👈 貼近主標 */
      opacity: 0.9;
    }

    /* 主標（變主角） */
    .page-title {
      margin: 0;
      font-weight: 800;      /* 👈 更粗 */
      font-size: 32px;       /* 👈 稍微放大 */
      letter-spacing: 1px;   /* 👈 金融感 */
      color: #ffffff;
    }
    .header-wrap .page-title {
      margin: 16px 16px 8px;
    }

    /* ✅ 右上角資料來源（不影響 layout） */
    .data-source {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #cbd5e1;
    }

    .controls { margin: 8px 16px 12px; }
    .layout { margin: 0 16px 24px; }

    .chart-section { margin: 8px 0 24px; }
    .chart-wrap { background: rgba(15,23,42,.35); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 8px 8px 2px; }
    #comboChart { width: 100%; height: 380px; display: block; }

    .axis path, .axis line { stroke: rgba(255,255,255,.15); }
    .axis text { fill: #e5e7eb; font-size: 12px; }
    .x.axis text { transform: translateY(4px); }
    .y.axis-left text { fill: #eab308; }
    .y.axis-right text { fill: #9be2ff; }

    .bar-fixed { fill: #e74c3c; opacity: .9; }
    .line-mom { fill: none; stroke: #f4d03f; stroke-width: 2px; }
    .line-yoy { fill: none; stroke: #00d8d6; stroke-width: 2px; }
    .zero-line { stroke: rgba(255,255,255,.25); stroke-dasharray: 4 4; }

    .legend-row { display: flex; align-items:center; gap:12px; color:#e5e7eb; margin: 6px 2px 0; flex-wrap: wrap; }
    .legend-row .chip { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:2px 8px; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); }
    .chip .swatch { width:12px; height:12px; border-radius:2px; display:inline-block; }

    .meta { color: #cbd5e1; font-size: 12px; }

      /* ====== ✅ 新增：上下游熱力圖 legend 樣式 ====== */
    .section-head .legend {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .section-head .legend .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: .2px;
      background: transparent;
      border: 1px solid currentColor;
      font-weight: 700;   /* 👈 這裡控制預設粗細 */
    }

    .section-head .legend .pos-chip {
      color: #3b82f6;                 /* 👈 表現佳 顏色 */
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.16);
      font-weight: 800;               /* 👈 表現佳 粗細 */
    }


    .section-head .legend .neg-chip {
      color: #9ca3af;                 /* 👈 表現弱 顏色 */
      border-color: #9ca3af;
      background: rgba(156, 163, 175, 0.1);
      font-weight: 800;               /* 👈 表現弱 粗細 */
    }
    /* ====== ✅ 新增結束 ====== */

    /* ====== 最新月營收創新高彙整 ====== */
  .new-high-panel {
    margin-top: 16px;
    margin-left: 0;         /* 靠右 */
    width: 100%;     /* 右下角視覺 */
    background: rgba(15,23,42,.40);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px;
    padding: 12px;
    color: #e5e7eb;
  }

  .new-high-head {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .new-high-head h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: .3px;
    color: #ffffff;
  }

  .new-high-table-wrap {
    overflow: visible;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 8px;
    background: rgba(2,6,23,.35);
  }

  .new-high-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 620px;
    font-size: 13px;
    color: #e5e7eb;
  }

  .new-high-table thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #0f172a;
    color: #cbd5e1;
    text-align: left;
    font-weight: 800;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,.12);
    white-space: nowrap;
  }

  .new-high-table tbody td {
    padding: 8px 12px;
    border-bottom: 1px dashed rgba(255,255,255,.08);
    vertical-align: middle;
  }

  .new-high-table tbody tr:hover td {
    background: rgba(255,255,255,.03);
  }

  .new-high-table .group-row td {
    background: rgba(59,130,246,.12);
    color: #dbeafe;
    font-weight: 900;
    border-bottom: 1px solid rgba(59,130,246,.18);
    padding-top: 10px;
    padding-bottom: 10px;
  }

  .new-high-table td.code {
    font-weight: 800;
    color: #ffffff;
    white-space: nowrap;
  }

  .new-high-table td.name {
    white-space: nowrap;
  }

  .new-high-table td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .new-high-empty {
    padding: 14px 12px;
    color: #cbd5e1;
    font-size: 13px;
  }

  @media (max-width: 980px){
    .new-high-panel {
      width: 100%;
      margin-left: 0;
    }
  }
    

    #icp-section { margin: 24px 16px; }
    #icp-section .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }

    #icp-fold-wrap { position: relative; }
    #icp-scroll { overflow: hidden; transition: max-height .25s ease, margin-top .25s ease; }
    #icp-fade { position:absolute; left:0; right:0; height:42px; bottom:0; background:linear-gradient(to bottom, rgba(15,23,42,0), rgba(15,23,42,.95)); pointer-events:none; display:none; }
    #icp-expander { position:absolute; left:50%; transform:translateX(-50%); font-size:22px; font-weight:900; color:#fff; background:transparent; border:none; padding:0; cursor:pointer; z-index:10; user-select:none; }

    #icp-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    .icp-box { background: rgba(15,23,42,.40); border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:10px; color:#e5e7eb; min-height:180px; }
    .icp-title { font-weight:900; letter-spacing:.5px; margin:4px 0 10px; color:#ffffff; font-size:16px; }

    .icp-card { background: rgba(255,255,255,.02); border:1px dashed rgba(255,255,255,.18); border-radius:8px; padding:10px; margin-bottom:10px; transition: border-color .15s ease, box-shadow .15s ease; }
    .icp-card:hover { border-color:#ffffff; box-shadow: 0 0 0 1px #ffffff inset; }
    .icp-card-title { font-weight:800; color:#93c5fd; margin-bottom:6px; font-size:14px; letter-spacing:.3px; }

    .icp-box ul { list-style:none; margin:0; padding:0; }
    .icp-box li { padding:4px 2px; border-bottom:1px dashed rgba(255,255,255,.08); font-size:13px; line-height:1.35; transition: transform .12s ease, font-weight .12s ease, color .12s ease; cursor:pointer; }
    .icp-box li:hover { font-weight:800; transform: translateY(-1px); color:#ffffff; }
    .icp-box .code { display:inline-block; min-width:52px; color:#fff; font-weight:700; }

    .icp-note { display:none; }
    @media (max-width: 980px){ #icp-grid{ grid-template-columns: 1fr; } }
  </style>
</head>

<body>

<div class="header-wrap">
  <div class="header-title-group">
    <div class="sub-title">富邦投顧</div>
    <h1 class="page-title">營收熱力圖</h1>
  </div>
  <div class="data-source">資料來源：CMoney、Bloomberg</div>
</div>



  <section class="controls">
    <div class="field">
      <label for="stockInput">股票代號 / 名稱</label>
      <input id="stockInput" type="text" placeholder="例如：2330 或 台積電" />
    </div>
    <div class="field">
      <label for="monthSelect">月份</label>
      <select id="monthSelect"></select>
    </div>
    <div class="field">
      <label for="metricSelect">指標</label>
      <select id="metricSelect">
        <option value="YoY">年成長 (YoY)</option>
        <option value="MoM">月變動 (MoM)</option>
      </select>
    </div>
    <button id="runBtn" class="primary">查詢</button>
    <div id="resultChip" class="result-chip" aria-live="polite"></div>

  </section>

  <main class="layout">
    <section class="column" id="upstreamCol">
      <div class="section-head">
        <h2>相同產業分類</h2>
        <div class="legend">
          <span class="chip pos-chip">表現佳</span>
          <span class="chip neg-chip">表現弱</span>
        </div>
      </div>
      <div class="treemap-wrap"><svg id="upTreemap"></svg></div>
       <div id="upHint" class="meta" style="margin-top:6px"></div>
    </section>

    <section class="column" id="downstreamCol">
      <div class="section-head">
        <h2>概念股</h2>
        <div class="legend">
          <span class="chip pos-chip">表現佳</span>
          <span class="chip neg-chip">表現弱</span>
        </div>
      </div>
      <div class="treemap-wrap"><svg id="downTreemap"></svg></div>
       <div id="upHint" class="meta" style="margin-top:6px"></div>
    </section>

    <section id="icp-section">
      <div class="section-head"><h2>個股產業鏈</h2><div class="icp-note"></div></div>
      <div id="icp-fold-wrap">
        <div id="icp-scroll">
          <div id="icp-grid">
            <aside class="icp-box">
              <div class="icp-title">上游廠商</div>
              <div id="icp-up-wrap"></div>
            </aside>
            <aside class="icp-box">
              <div class="icp-title">下游客戶</div>
              <div id="icp-down-wrap"></div>
            </aside>
          </div>
        </div>
        <div id="icp-fade"></div>
        <div id="icp-expander" aria-expanded="false" role="button" title="展開/收合">＋</div>
      </div>
    </section>

    <section class="chart-section" id="combo-section">
      <div class="section-head">
        <h2>營收走勢</h2>
        <div class="legend-row">
          <span class="chip"><i class="swatch" style="background:#e74c3c"></i> 合併營收</span>
          <span class="chip"><i class="swatch" style="background:#f4d03f"></i> 月增率 (MoM)</span>
          <span class="chip"><i class="swatch" style="background:#00d8d6"></i> 年增率 (YoY)</span>
        </div>
      </div>
      <div class="chart-wrap"><svg id="comboChart"></svg></div>
      <div id="comboHint" class="meta" style="display:none"></div>
        <div id="newHighSection" class="new-high-panel">
       <div class="new-high-head">
         <h3 id="newHighTitle">最新月營收創新高個股彙整</h3>
         <div id="newHighMeta" class="meta"></div>
       </div>
       <div id="newHighTableWrap" class="new-high-table-wrap"></div>
      </div>
    </section>
  </main>


  <script src='app.js?v='+VER></script>
  <script src='stock-link-plugin.js?v='+VER></script>
  <script src='app_query_link_B.js?v='+VER></script>
  <script src='combo-chart.js?v='+VER></script>
  <script src='treemap-tooltip.js?v='+VER></script>
  <script src='industry-chain-panel.js?v='+VER></script>


</body>
</html>
